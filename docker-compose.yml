services:
  aigateway:
    build: .
    image: aigateway:latest
    container_name: aigateway
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      TCDMX_API_KEY: "${TCDMX_API_KEY}"
      TCDMX_BASE_URL: "${TCDMX_BASE_URL:-https://tcdmx.com}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
